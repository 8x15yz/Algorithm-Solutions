<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-soft: #f7f9fc;
      --border: #e8ecf2;
      --text: #1a202c;
      --muted: #718096;
      --accent: #4f7df3;
      --accent-bg: #eef2ff;
    }

    body {
      font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
    }

    a { color: inherit; text-decoration: none; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .site-title span { color: var(--accent); }
    .github-link {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .github-link:hover { color: var(--text); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .intro {
      margin-bottom: 52px;
    }
    .intro h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    .intro p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
    }

    section { margin-bottom: 44px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .month-card {
      display: block;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .month-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(79, 125, 243, 0.1);
    }
    .month-card.current {
      background: var(--accent-bg);
      border-color: var(--accent);
    }
    .month-card .month-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .month-card.current .month-name { color: var(--accent); }
    .month-card .month-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .archive-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .archive-item:hover { border-color: #c4cdd8; }
    .archive-year { font-weight: 600; margin-bottom: 2px; }
    .archive-desc { color: var(--muted); font-size: 12px; }
    .archive-arrow { color: var(--muted); font-size: 13px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

      </svg>
      GitHub

  </div>
</header>

<main>

</html>
